<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zegar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #eef0f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #tubesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: none;
            pointer-events: none;
            mix-blend-mode: difference;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: #ffffff;
            padding: 40px;
            border-radius: 6px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        h1 {
            color: #1a2533;
            margin-bottom: 24px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #clockCanvas {
            border-radius: 50%;
            display: block;
            margin: 0 auto;
        }

        .digital-time {
            margin-top: 18px;
            font-size: 1.4rem;
            color: #1a2533;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
        }

        .status {
            margin-top: 10px;
            padding: 4px 14px;
            border-radius: 3px;
            font-weight: 600;
            font-size: 0.72rem;
            letter-spacing: 1.5px;
            display: inline-block;
        }

        .status.running {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .status.paused {
            background: #fce4ec;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .controls {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 7px 18px;
            border: 1px solid #d0d5dd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #1a2533;
            transition: background 0.15s;
        }

        .btn:hover {
            background: #f5f7fa;
        }

        .btn-pause {
            background: #1a2533;
            color: #ffffff;
            border-color: #1a2533;
        }

        .btn-pause:hover {
            background: #2c3e50;
        }

        .info {
            margin-top: 14px;
            color: #6b7280;
            font-size: 0.78rem;
        }
    </style>
</head>
<body>
    <canvas id="tubesCanvas"></canvas>

    <div class="container">
        <h1>Zegar</h1>
        <canvas id="clockCanvas" width="400" height="400"></canvas>
        <div class="digital-time" id="digitalTime">00:00:00</div>
        <div class="status running" id="status">DZIAŁA</div>
        <div class="controls">
            <button class="btn btn-pause" id="pauseBtn">Pauza (Spacja)</button>
            <button class="btn" id="trailBtn">Spirograf: WYŁ</button>
            <button class="btn" id="tubesBtn">Kursor 3D: WYŁ</button>
        </div>
        <p class="info">Naciśnij <strong>Spację</strong> aby zatrzymać / wznowić</p>
    </div>

    <script src="script.js"></script>

    <!-- type="module" bo używamy import - zwykły <script> tego nie obsługuje -->
    <script type="module">
        // biblioteka z Three.js - renderuje 3D tuby podążające za kursorem
        // ładujemy z CDN, nie trzeba nic instalować
        import TubesCursor from 'https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js';

        const tubesCanvas = document.getElementById('tubesCanvas');
        const tubesBtn = document.getElementById('tubesBtn');

        let tubesApp = null;    // instancja TubesCursor, null dopóki nie włączymy
        let tubesEnabled = false;

        // generuje tablicę losowych kolorów hex
        // 16777215 = 0xFFFFFF - maksymalna wartość koloru RGB
        function randomColors(count) {
            return new Array(count).fill(0).map(
                () => '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0')
            );
        }

        function initTubes() {
            // canvas musi mieć rozmiar okna w pikselach - inaczej obraz byłby rozciągnięty
            tubesCanvas.width = window.innerWidth;
            tubesCanvas.height = window.innerHeight;

            // uruchamiamy TubesCursor - tworzy scenę Three.js i renderer WebGL
            // kolory są odwrócone (pre-inwersja) bo używamy mix-blend-mode: difference
            // na białym tle: |biały - odwrócony_kolor| = oryginalny_kolor
            tubesApp = TubesCursor(tubesCanvas, {
                tubes: {
                    colors: ['#069804', '#ac43d7', '#96a72a'],
                    lights: {
                        intensity: 200,
                        colors: ['#7c0c91', '#0175d1', '#00ff75', '#9f512a'],
                    },
                },
            });
        }

        tubesBtn.addEventListener('click', () => {
            tubesEnabled = !tubesEnabled;

            if (tubesEnabled) {
                tubesCanvas.style.display = 'block';
                if (!tubesApp) {
                    // inicjalizujemy tylko raz - biblioteka Three.js jest duża,
                    // nie chcemy jej ładować przy każdym kliknięciu
                    initTubes();
                }
                tubesBtn.textContent = 'Kursor 3D: WŁ';
            } else {
                tubesCanvas.style.display = 'none';
                tubesBtn.textContent = 'Kursor 3D: WYŁ';
            }
        });

        // kliknięcie gdziekolwiek losuje nowe kolory tubek i świateł
        document.body.addEventListener('click', () => {
            if (!tubesApp || !tubesEnabled) return;
            const colors = randomColors(3);
            const lightsColors = randomColors(4);
            tubesApp.tubes.setColors(colors);
            tubesApp.tubes.setLightsColors(lightsColors);
        });

        // przy zmianie rozmiaru okna aktualizujemy rozmiar canvasa
        // inaczej tuby byłyby rysowane tylko na starym rozmiarze
        window.addEventListener('resize', () => {
            if (!tubesApp) return;
            tubesCanvas.width = window.innerWidth;
            tubesCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
